name: Atualizar bolão

on:
  schedule:
    - cron: "0 13 * * *"      # 13:00 UTC = 10:00 em Brasília
  workflow_dispatch:           # permite disparar manualmente pelo site do GitHub

permissions:
  contents: write              # para commitar a planilha/estado atualizados
  pages: write                 # para publicar no GitHub Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Gerar página (busca placares + recalcula)
        run: python gerar.py
      # Publica o Pages ANTES de commitar: a publicação nunca depende do push dar certo.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Commitar atualizações (best-effort, não bloqueia a publicação)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar."
          else
            git commit -m "chore: atualização automática $(date -u +%F)"
            git pull --rebase --autostash origin main || true
            git push || echo "push falhou; dados serão regenerados na próxima execução"
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
