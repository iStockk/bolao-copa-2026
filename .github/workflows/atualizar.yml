name: Atualizar bolão

on:
  # IMPORTANTE: o cron do GitHub é "melhor esforço" — atrasa e às vezes PULA horários,
  # principalmente no minuto :00 (mais congestionado do mundo). Por isso usamos VÁRIOS
  # horários no minuto :17 (fora de pico): se o GitHub furar um, o próximo recupera em ~2h.
  # Horários em UTC; Brasília = UTC-3. Cobrem a janela de jogos + refresh matinal.
  schedule:
    - cron: "17 12 * * *"      # 09:17 BRT — fresquinho de manhã
    - cron: "17 16 * * *"      # 13:17 BRT
    - cron: "17 18 * * *"      # 15:17 BRT
    - cron: "17 20 * * *"      # 17:17 BRT
    - cron: "17 22 * * *"      # 19:17 BRT
    - cron: "17 0 * * *"       # 21:17 BRT
    - cron: "17 2 * * *"       # 23:17 BRT
    - cron: "17 4 * * *"       # 01:17 BRT — pega jogo que terminou tarde
  workflow_dispatch:           # permite disparar manualmente pelo site do GitHub
  push:
    branches: [main]           # publica automaticamente a cada envio (commit do robô usa [skip ci])

permissions:
  contents: write              # para commitar a planilha/estado atualizados
  pages: write                 # para publicar no GitHub Pages
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Gerar página (busca placares + recalcula)
        run: python gerar.py
      # Publica o Pages ANTES de commitar: a publicação nunca depende do push dar certo.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Commitar atualizações (best-effort, não bloqueia a publicação)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Sem mudanças para commitar."
          else
            git commit -m "chore: atualização automática $(date -u +%F) [skip ci]"
            git pull --rebase --autostash origin main || true
            git push || echo "push falhou; dados serão regenerados na próxima execução"
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
